name: NYC Property Manager Targeting Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Prepare folders
        run: |
          mkdir -p data out
          chmod +x download_nyc_data.sh

      - name: Validate download script is plain bash
        run: |
          head -c 50 download_nyc_data.sh | cat
          if head -c 50 download_nyc_data.sh | grep -q '{\\rtf'; then
            echo "FATAL: download_nyc_data.sh is RTF, not bash."
            exit 1
          fi

      - name: Download NYC data
        env:
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: |
          bash download_nyc_data.sh data

      - name: Run pipeline using local files
        run: |
          python nyc_live_pipeline.py --data-dir data --output-dir out

      - name: Upload Excel outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyc-multifamily-targeting
          path: out/*.xlsx
